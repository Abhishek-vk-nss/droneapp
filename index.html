<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drone Ops | Secure Access</title>
    <style>
        :root { 
            --accent: #ffaa00; 
            --bg: #0a0a0a; 
            --glass: rgba(20, 20, 20, 0.9); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', 'Segoe UI', sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            color: #eee; 
            overflow: hidden; 
        }

        /* --- TOP STATUS BAR --- */
        .status-bar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(255, 170, 0, 0.3);
            display: flex;
            justify-content: space-between;
            padding: 8px 20px;
            font-size: 0.75rem;
            color: var(--accent);
            z-index: 3000;
            letter-spacing: 1px;
        }

        /* --- MAIN UI --- */
        .glass-panel {
            background: var(--glass); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 360px;
            border: 1px solid rgba(255, 170, 0, 0.2); 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 10;
            margin-top: -50px; /* Adjusted for status bar */
        }

        .btn {
            display: block; 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0;
            border-radius: 12px; 
            background: #111; 
            border: 1px solid var(--accent);
            color: var(--accent); 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn:active { transform: scale(0.98); }

        /* --- FIXED VIDEO PORTION --- */
        .video-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 180px; /* Increased height for better visibility */
            background: #000;
            border-top: 2px solid var(--accent);
            overflow: hidden;
            pointer-events: none;
            z-index: 5;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 180px;
            min-width: 320px;
            transform: translate(-50%, -50%); /* Centers the video perfectly */
            opacity: 0.7;
        }

        /* --- MODALS --- */
        #authModal, #uploadModal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); 
            z-index: 4000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .modal-box {
            background: #151515; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid var(--accent); 
            width: 100%; 
            max-width: 320px; 
            text-align: center;
        }

        input {
            width: 100%; padding: 14px; margin: 15px 0; background: #000;
            border: 1px solid #333; color: var(--accent); text-align: center; 
            border-radius: 10px; font-size: 1rem; outline: none;
        }

        /* --- ANIMATION --- */
        .loader {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer {
            position: fixed;
            bottom: 195px; /* Sits right above the video border */
            font-size: 0.6rem;
            opacity: 0.5;
            text-align: center;
            width: 100%;
            z-index: 6;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        <span id="date-time">LOADING...</span>
        <span id="bat-level">BAT: --%</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-panel">
        <h2 style="color:var(--accent); letter-spacing:3px; margin-bottom: 5px;">DRONE OPS</h2>
        <p style="font-size: 0.65rem; opacity: 0.5; margin-bottom: 20px;">VSSC PROJECT TERMINAL</p>
        
        <button class="btn btn-primary" onclick="showAuth()">Download CAD Model</button>
        <button class="btn" onclick="window.open('https://play.google.com/store/apps/details?id=appinventor.ai_makerslabfablab.Arm_Robot_Control', '_blank')">Android Control App</button>
        <button class="btn" onclick="showUpload()">PC Software</button>
    </div>

    <div class="video-container">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/9fhgz0oA3kM?autoplay=1&mute=1&controls=0&loop=1&playlist=9fhgz0oA3kM&rel=0&showinfo=0&iv_load_policy=3&modestbranding=1" frameborder="0" allow="autoplay"></iframe>
        </div>
    </div>

    <div id="authModal">
        <div class="modal-box">
            <p style="color:var(--accent); font-size:0.8rem;">IDENTITY VERIFICATION</p>
            <input type="text" id="regInput" placeholder="NSS24ME000" autocomplete="off">
            <button class="btn btn-primary" onclick="validateAccess()">VERIFY & DOWNLOAD</button>
            <button onclick="closeAuth()" style="background:none; border:none; color:#666; font-size:0.7rem; margin-top:10px; cursor:pointer;">CANCEL</button>
            <p id="errorBox" style="color:#ff4444; font-size:0.7rem; margin-top:12px; display:none;">ACCESS DENIED</p>
        </div>
    </div>

    <div id="uploadModal">
        <div class="modal-box">
            <div class="loader"></div>
            <p style="color:var(--accent); font-size:1rem; letter-spacing: 2px;">UPLOADING...</p>
            <p style="color:#666; font-size:0.7rem; margin-top:10px;">COMING SOON</p>
            <button class="btn" style="margin-top:20px;" onclick="document.getElementById('uploadModal').style.display='none'">BACK</button>
        </div>
    </div>

    <footer>
        DESIGNED BY <span style="color:var(--accent); font-weight:bold;">ABHISHEK VK</span>
    </footer>

    <script>
        const studentData = {
            "NSS24ME008": "Abhijith Vasudevan",
            "NSS24ME012": "ME - TEST",
            "NSS24ME013": "Abijith Krishna",
            "NSS24ME015": "Thomas Stephen",
            "NSS24ME020": "Ajmal",
            "NSS24ME022": "Akbar",
            "NSS24ME024": "Alvin",
            "NSS24ME025": "Ameen",
            "NSS24ME032": "Anirudh R",
            "NSS24ME033": "Arjun krishna",
            "NSS24ME038": "Athul Krishna",
            "NSS24ME040": "Bharath",
            "NSS24ME045": "Druvaa",
            "LNSS24ME142": "Dhanish",
            "NSS23ME044": "Anuyukth"
        };

        const mediafireLink = "https://www.mediafire.com/file/yfwjk7vsp1nluog/Dronenew.zip/file";

        // Status Bar Logic
        function updateStatus() {
            const now = new Date();
            const dateStr = now.toLocaleDateString([], {day:'2-digit', month:'short'});
            const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
            document.getElementById('date-time').innerText = `${dateStr} | ${timeStr}`;

            if('getBattery' in navigator) {
                navigator.getBattery().then(bat => {
                    document.getElementById('bat-level').innerText = `BAT: ${Math.round(bat.level * 100)}%`;
                });
            }
        }
        setInterval(updateStatus, 1000);
        updateStatus();

        function showAuth() { document.getElementById('authModal').style.display = 'flex'; document.getElementById('regInput').focus(); }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }
        function showUpload() { document.getElementById('uploadModal').style.display = 'flex'; }

        function validateAccess() {
            const inputID = document.getElementById('regInput').value.trim().toUpperCase();
            if (studentData[inputID]) {
                const name = studentData[inputID];
                const fID = "1FAIpQLSdcRB2g5X5Nk9vvTQjnZz_TP2QSRN0LPWpvxHtBkQCeDsjhRg"; 
                const eID_Reg = "entry.1225511078"; 
                const eID_Name = "entry.1398758621"; 
                const logURL = `https://docs.google.com/forms/d/e/${fID}/formResponse?${eID_Reg}=${inputID}&${eID_Name}=${encodeURIComponent(name)}&submit=Submit`;
                
                fetch(logURL, { mode: 'no-cors' });
                window.open(mediafireLink, "_blank");
                closeAuth();
            } else {
                document.getElementById('errorBox').style.display = 'block';
            }
        }

        document.body.addEventListener('click', () => { 
            document.getElementById('bgMusic').play().catch(()=>{}); 
        }, { once: true });
    </script>
</body>
</html>
